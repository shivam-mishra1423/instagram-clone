version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: instagram_clone
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:password@db/instagram_clone
      SECRET_KEY: your-secret-key-here
      JWT_SECRET_KEY: your-jwt-secret-key
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
